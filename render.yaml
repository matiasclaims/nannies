# Blueprint de Render — API NestJS + Postgres (PREVIEW para reuniones).
# NO es producción (esa va en Hostinger). Datos de ejemplo falsos solamente.
# Al conectar el repo en Render, este archivo crea la BD y el web service.

databases:
  - name: nannies-db
    plan: free
    databaseName: nannies
    user: nannies_app

services:
  - type: web
    name: nannies-api
    runtime: node
    plan: free
    rootDir: apps/api
    # --include=dev: instala devDependencies (nest CLI, tsc) aunque
    # NODE_ENV=production, que si no las omite y el build falla.
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nannies-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render genera un secreto aleatorio
      - key: COOKIE_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      # Dominio del frontend en Vercel (se llena tras desplegar el front).
      - key: CORS_ORIGIN
        sync: false
